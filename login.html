<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Login ke akun Pertualangan untuk mengakses fitur lengkap.">
  <title>Login — Pertualangan</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="particles"></canvas>
  <div class="cursor-glow"></div>
  <div id="navbar-container"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <h2>Selamat Datang</h2>
      <p class="sub">Masuk ke akun petualanganmu</p>

      <form id="login-form">
        <div class="form-group" id="fg-email">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="email@contoh.com" required>
          <div class="form-error" id="err-email">Email tidak valid</div>
        </div>

        <div class="form-group" id="fg-password">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Masukkan password" required>
          <button type="button" class="password-toggle" id="toggle-password">👁️</button>
          <div class="form-error" id="err-password">Password minimal 6 karakter</div>
        </div>

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
          <div class="checkbox-row">
            <input type="checkbox" id="remember">
            <label for="remember" style="cursor:pointer;">Ingat saya</label>
          </div>
          <a href="#" style="font-size:13px;" onclick="alert('Fitur reset password akan segera hadir!')">Lupa password?</a>
        </div>

        <button type="submit" class="tombol-utama" style="width:100%;" id="login-btn">Masuk</button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:14px;color:var(--text-dim);">
        Belum punya akun? <a href="#" onclick="alert('Fitur registrasi akan segera hadir!')">Daftar sekarang</a>
      </p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
